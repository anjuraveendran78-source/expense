{% extends "base_dashboard.html" %}
{% block content %}

<div class="flex justify-center items-start min-h-[70vh] pt-10 animate-fade-in-up">
        
    <div
    class="w-full max-w-lg bg-white dark:bg-slate-800 rounded-3xl 
    shadow-2xl border border-gray-100 dark:border-slate-700 overflow-hidden">
            
            <!-- Header -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-700 p-6 text-white">
                <h2 class="text-2xl font-bold tracking-wide">User Profile</h2>
                <p class="text-sm text-gray-200 mt-1">Manage your account information</p>
            </div>

            <!-- Profile Content -->
            <div class="p-8 grid md:grid-cols-2 gap-8">
              {% if profile %}
                
                 <!-- Username -->
                <div>
                    <label class="text-gray-400 text-sm">Username</label>
                    <input type="text" value="{{ profile.username }}"
                        class="w-full mt-1 px-4 py-2 rounded-lg
                        bg-gray-100 dark:bg-slate-700
                        text-gray-900 dark:text-white
                        border border-gray-300 dark:border-slate-600
                        placeholder-gray-400
                        focus:outline-none focus:ring-2 focus:ring-indigo-500
                        transition duration-200">
                </div>

                <!-- Email -->
                <div>
                    <label class="text-gray-400 text-sm">Email</label>
                    <input type="email" name="email" value="{{ profile.email_id }}"
                        class="w-full mt-1 px-4 py-2 rounded-lg
                        bg-gray-100 dark:bg-slate-700
                        text-gray-900 dark:text-white
                        border border-gray-300 dark:border-slate-600
                        placeholder-gray-400
                        focus:outline-none focus:ring-2 focus:ring-indigo-500
                        transition duration-200">
                </div>

                <!-- Phone -->
                <div>
                    <label class="text-gray-400 text-sm">Phone Number</label>
                    <input type="text" value="{{ profile.phn_no }}"
                        class="w-full mt-1 px-4 py-2 rounded-lg
                        bg-gray-100 dark:bg-slate-700
                        text-gray-900 dark:text-white
                        border border-gray-300 dark:border-slate-600
                        placeholder-gray-400
                        focus:outline-none focus:ring-2 focus:ring-indigo-500
                        transition duration-200">
                </div>
                
                <!-- Location -->
                <div class="md:col-span-2">
                    <label class="text-gray-400 text-sm">Location</label>
                    <input type="text" value="{{ profile.location }}"
                        class="w-full mt-1 px-4 py-2 rounded-lg
                        bg-gray-100 dark:bg-slate-700
                        text-gray-900 dark:text-white
                        border border-gray-300 dark:border-slate-600
                        placeholder-gray-400
                        focus:outline-none focus:ring-2 focus:ring-indigo-500
                        transition duration-200">
                </div>

              {% else %}
                  <div class="col-span-2 text-center py-10">
                        <p class="text-gray-400 text-lg">
                            No profile information available.
                        </p>
                    </div>
              {% endif %}    

            </div>

            <!-- Footer -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-700 p-6 text-white flex justify-center items-center">
                <a href="{% url 'edit_profile' %}" 
                   class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg transition duration-300 shadow-lg">
                    Edit Profile
                </a>
            </div> 


        </div>

    </div>
</div>

{% endblock %}
